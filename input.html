<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화인파트너스 | 데이터 입력</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyD5yGKzMemtfwPE6_hQhmEu9Ea_oIL-N68",
    authDomain: "fineweeklyinvest.firebaseapp.com",
    projectId: "fineweeklyinvest",
    storageBucket: "fineweeklyinvest.firebasestorage.app",
    messagingSenderId: "941229200117",
    appId: "1:941229200117:web:83028f4a7950428ede6bbc"
  };
  const app = initializeApp(firebaseConfig);
  window._db = getFirestore(app);
  window._fbReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <span class="logo-mark">FP</span>
    <span class="logo-text">화인파트너스</span>
    <span class="nav-divider">|</span>
    <span class="nav-subtitle">주간 업무일지 & 계획</span>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-btn">대시보드</a>
    <a href="input.html" class="nav-btn active">데이터 입력</a>
    <a href="admin.html" class="nav-btn">⚙ 관리자</a>
    <span class="db-status" id="dbStatus">● 연결 중...</span>
  </div>
</nav>

<main class="main-container input-page">

  <div class="input-header">
    <h2 class="input-title">투자검토 항목 입력</h2>
    <p class="input-desc">각 부서 담당자는 아래 양식을 통해 주간 검토 현황을 입력해 주세요. 주간 시작일 기준으로 금주/전주가 자동 구분됩니다.</p>
  </div>

  <!-- ══ 가로 행 입력 폼 ══ -->
  <div class="row-form-panel">
    <div class="row-form-scroll">
      <div class="row-form">

        <div class="ri-cell ri-xs">
          <label>부서 <span class="req">*</span></label>
          <select id="f_dept">
            <option value="">선택</option>
            <option>투자1부</option>
            <option>투자2부</option>
            <option>투자3부</option>
            <option>관리부</option>
          </select>
        </div>

        <div class="ri-cell ri-xs">
          <label>구분 <span class="req">*</span></label>
          <select id="f_category">
            <option value="">선택</option>
            <option>작성중</option>
            <option>신규</option>
            <option>기존</option>
            <option>기존★</option>
            <option>관리자산</option>
            <option>입/출금</option>
            <option>기타</option>
          </select>
        </div>

        <div class="ri-cell ri-md">
          <label>주간 시작일 <span class="req">*</span></label>
          <input type="date" id="f_week_start" onchange="updateWeekTypeBadge()">
        </div>

        <div class="ri-cell ri-lg">
          <label>회사명 / 사업명 <span class="req">*</span></label>
          <input type="text" id="f_company" placeholder="예: 제주반도체">
        </div>

        <div class="ri-cell ri-xl">
          <label>업종(상세)</label>
          <input type="text" id="f_industry" placeholder="예: 저전력 메모리 반도체 팹리스">
        </div>

        <div class="ri-cell ri-xl">
          <label>투자 형태 및 주요 조건</label>
          <input type="text" id="f_invest_type" placeholder="예: 신규 CB 250억 / Pre-Value 1.48조 / Coupon 0%">
        </div>

        <div class="ri-cell ri-md">
          <label>목표</label>
          <input type="text" id="f_target" placeholder="예: IPO / 장내매각">
        </div>

        <div class="ri-cell ri-md">
          <label>총 규모</label>
          <input type="text" id="f_total_size" placeholder="예: 250억원">
        </div>

        <div class="ri-cell ri-md">
          <label>검토금액</label>
          <input type="text" id="f_review_amount" placeholder="예: 20억원">
        </div>

        <div class="ri-cell ri-sm">
          <label>진행상황</label>
          <select id="f_status">
            <option value="">선택</option>
            <option>작성중</option>
            <option>검토중</option>
            <option>심사중</option>
            <option>투자완료</option>
            <option>협의중</option>
            <option>보류</option>
            <option>종결</option>
            <option>-</option>
          </select>
        </div>

        <div class="ri-cell ri-lg">
          <label>비고</label>
          <input type="text" id="f_note" placeholder="추가 메모">
        </div>

        <!-- 숨김 필드 (데이터 호환) -->
        <input type="hidden" id="f_date">
        <input type="hidden" id="f_week_type">
        <input type="hidden" id="f_pre_value">
        <input type="hidden" id="f_equity_ratio">
        <input type="hidden" id="f_coupon">
        <input type="hidden" id="f_irr">
        <input type="hidden" id="f_moic">
        <input type="hidden" id="f_exit_method">
        <input type="hidden" id="f_exit_year">
        <input type="hidden" id="f_put_call">
        <input type="hidden" id="f_tag_drag">

        <div class="ri-cell">
          <label>&nbsp;</label>
          <div style="display:flex;gap:6px">
            <button class="btn-cancel" onclick="resetForm()">초기화</button>
            <button class="btn-submit" id="btnSubmit" onclick="submitEntry()">저장</button>
          </div>
        </div>

      </div><!-- /.row-form -->
    </div><!-- /.row-form-scroll -->

    <div class="row-form-footer">
      <span id="weekTypeBadge" class="week-type-badge empty">주간 시작일을 선택하세요</span>
      <div id="formMsg" class="form-msg"></div>
    </div>
  </div><!-- /.row-form-panel -->

  <!-- ══ 목록 패널 ══ -->
  <div class="list-panel-full">
    <div class="list-panel-header">
      <span class="list-panel-title">입력된 항목 목록</span>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="filterWeek" onchange="renderList()" class="list-filter-sel">
          <option value="">전체 주차</option>
        </select>
        <select id="filterDept" onchange="renderList()" class="list-filter-sel">
          <option value="">전체 부서</option>
          <option>투자1부</option><option>투자2부</option>
          <option>투자3부</option><option>관리부</option>
        </select>
        <select id="filterCatList" onchange="renderList()" class="list-filter-sel">
          <option value="">전체 구분</option>
          <option>신규</option><option>기존</option><option>기존★</option>
          <option>관리자산</option><option>입/출금</option><option>기타</option>
        </select>
      </div>
    </div>
    <div id="entryList" class="entry-list">
      <div class="entry-empty">Firebase 연결 후 항목이 표시됩니다.</div>
    </div>
  </div>

</main>

<script src="db.js" type="module"></script>
<script src="input.js"></script>
</body>
</html>
